<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="todo-app">
      <header class="todo-header">
        <h1 class="todo-title">To Do List</h1>
      </header>

      <section class="auth-bar" id="auth-bar" hidden>
        <div class="auth-status" id="auth-status"></div>
        <form class="auth-form" id="auth-form" hidden>
          <input
            id="auth-email"
            class="auth-input"
            type="email"
            placeholder="Email"
            autocomplete="email"
            required
          />
          <input
            id="auth-password"
            class="auth-input"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="auth-submit" id="auth-submit">Sign up</button>
          <button type="button" class="auth-toggle" id="auth-toggle">
            Already have an account? Log in
          </button>
        </form>
      </section>

      <p class="todo-error" hidden></p>

      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          class="todo-input"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
        <button type="submit" class="todo-add-button">Add</button>
      </form>

      <ul id="todo-list" class="todo-list"></ul>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
