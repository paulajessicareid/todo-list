<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-top">
        <header class="app-brand">
          <a class="app-brand-link" href="/" aria-label="To Do List">
            <img class="app-brand-logo" src="/todo-logo.svg" alt="" width="80" height="80" />
            <h1 class="app-brand-title">To Do List</h1>
          </a>
        </header>

        <section class="auth-bar" id="auth-bar" hidden>
        <div class="auth-status" id="auth-status"></div>
        <form class="auth-form" id="auth-form" hidden>
          <input
            id="auth-email"
            class="auth-input"
            type="email"
            placeholder="Email"
            autocomplete="email"
            required
          />
          <input
            id="auth-password"
            class="auth-input"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="auth-submit" id="auth-submit">Sign up</button>
          <button type="button" class="auth-toggle" id="auth-toggle">
            Already have an account? Log in
          </button>
        </form>
        </section>
      </div>

      <div id="app" class="todo-app">
        <p class="todo-error" hidden></p>

      <div class="todo-form-wrap">
        <form id="todo-form" class="todo-form">
          <input
            id="todo-input"
            class="todo-input"
            type="text"
            placeholder="What needs to be done?"
            autocomplete="off"
          />
          <button type="submit" class="todo-add-button">Add</button>
        </form>
        <p id="todo-input-error" class="todo-input-error" hidden></p>
      </div>

      <div class="todo-controls">
        <label class="todo-control">
          Filter
          <select id="todo-filter" class="todo-control-select">
            <option value="all">All</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label class="todo-control">
          Sort
          <select id="todo-priority-sort" class="todo-control-select">
            <option value="none">Default</option>
            <option value="high-low">High to low</option>
            <option value="low-high">Low to high</option>
          </select>
        </label>
        <label class="todo-control todo-control-toggle">
          Show completed
          <input type="checkbox" id="todo-show-completed" class="todo-show-completed" checked />
        </label>
      </div>

      <div class="todo-table">
        <div class="todo-table-header">
          <span class="todo-col todo-col-check" aria-hidden="true"></span>
          <span class="todo-col todo-col-colors" aria-hidden="true"></span>
          <span class="todo-col todo-col-text">to-do</span>
          <span class="todo-col todo-col-priority">priority</span>
          <span class="todo-col todo-col-actions" aria-hidden="true"></span>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
      </div>
    </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
